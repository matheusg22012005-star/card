<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
    
    
    body{
    background-color: #1a0f0f;
    font-family: Arial, Helvetica, sans-serif;
    color: #ffffff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
    }

.card{
    width: 280px;
    padding: 25px;
    border: 2px solid #ff2e2e;
    border-radius: 15px;
    text-align: center;
    background-color: #2b1414;
    box-shadow: 0px 0px 25px rgba(255, 0, 0, 0.3);
}

img{
    width: 100px;
    height: 100px;
    border-radius: 50%;
    border: 3px solid #ff2e2e;
    margin-bottom: 15px;
}

h2{
    margin: 10px 0;
    color: #ffffff;
}

button{
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    background-color: #ff2e2e;
    color: white;
    cursor: pointer;
}

.botoes{
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-top: 10px;
    margin-bottom: 15px;
}

.skills{
    margin-top: 12px;
    text-align: left;
}

.skills h3{
    font-size: 15px;
    margin-bottom: 10px;
    color: #ff2e2e;
}

.tags{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;

}

.tag{
    border: 1px solid #ff2e2e;
    padding: 5px 8px;
    border-radius: 5px;
    color: white;
}

.social-media{
    margin-top: 20px;
    display: flex;
    justify-content: center;
    gap: 15px;
    font-size: 20px;
}

.social-media i{
    cursor: pointer;
    transition: 0.3s;
    color: #ffffff;
}

.social-media i:hover{
    color: #ff2e2e;
    transform: scale(1.2);
}

    </style>
</head>
<body>
    <div class="card">
        <img src="perfil.png" alt="Foto de Perfil">
        <h2>Matheus Gonçalves Silva</h2>
        <div class="local">Montes Claros-MG</div>
        <div class="job">Tec Informatica</div>

        <div class="botoes">
            <a href="htts://wa.me/553899350398?text=Olá,%20vim%20pelo%20card." target="_blank">
            <button class="primario">Mensagem</button>
            </a>
            <button class="segundario">Follow</button>
        </div>

        <div class="skills">
            <h3>Habilidades</h3>
            <div class="tags">
                <span class="tag">Tec Informatica</span>
                <span class="tag">Tec de Redes de Computadores</span>
                <span class="tag">Criativo</span>
                <span class="tag">Entusiasmando</span>
        </div>
    </div>

    <div class="social-media">
        
    <a href="https://github.com/matheusg22012005-star/card.git" target="_blank">
        <i class="fab fa-github"></i>
     </a>
        
     <a href="htts://www.tiktok.com/@teteuz_?_r=1&_t=ZS-95cFWTdOxo" target="_blank">
        <i class="fab fa-tiktok"></i>
     </a>

    <a href="https://www.instagram.com/teuzgs_" target="_blank">
        <i class="fab fa-instagram"></i>
    </a>

    </div>

</div>


</body>
</html>
